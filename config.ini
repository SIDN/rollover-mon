[ROLLOVER]
# The zone of which the keys are rolled e.g.
# zone = nl.
zone = cz.


[DATABASE]
# Absolute path to the sqllite DB file
db_path = /Users/moritz.muller/Documents/Projecten/PaperAndPresentations/se_rollover/tool/monitoring_tool/db/rollover_mon.db


[TTLS]
# The TTLs in seconds of the records that need to be replaced. Leave empty if not applicable
ttl_dnskey = 3600
ttl_rrsig = 3600
ttl_ds = 48000 


[MEASUREMENTS]
# Defines how often the probes will query for the records (in seconds)
msm_frequency_publication_delay = 120

# Measurements for propgation delaye are carried out by default once every TTL.
# Change settings below if different frequencey preferred
msm_frequency_propagation_delay_dnskey = 
msm_frequency_propagation_delay_rrsig = 
msm_frequency_propagation_delay_ds = 

# Domains to valid and bogus records to monitor the trust chain
trust_chain_valid = nic.cz 
trust_chain_bogus = www.rhybar.cz 


[NAMESERVERS]
# IP addresses of the authoritative name servers 
# These are necessary for monitoring the propgation delay
# Use ',' to separate IPs
# IPv4 and IPV6 addresses allowed
ips_child_ipv4 = 194.0.12.1, 194.0.13.1 
ips_child_ipv6 = 2001:678:f::1, 2001:678:10::1
ips_parent_ipv4 = 198.41.0.4
ips_parent_ipv6 = 2001:503:ba3e::2:30


[RIPE]
# Your API key.
# With this key you must be able to create new measurements,
# read measurement results, and stop measurements
# Finde more information here: https://atlas.ripe.net/docs/keys/
api_key = f1c7622e-ad9d-4061-a3b5-4ea054c9d851

# Which probes should be used for the measurement
# Use 'all" for every available probe (user needs enought credits and raise their limits at RIPE)
# or use a number x to select x random probes
# or leave empty to configure probes more fine graned with settings below
probes = 10

# if setting 'probes' is empty you can select more fine graned here
# Probe IDs, separated by comma
probe_ids  

# AS number in which probes should be located, e.g. 1140
as_nr 

# Coountry in which the probes should be located
# Use ISO 3166 two letter country codes (e.g. NL, or US)
country   

# Continents onn which the probes should be located
# Use comma separated two letter continent codes 
# (AF = Africa, AS=Asia, EU = EUROPE, NA = North America, SA = South America, OZ = Oziania)
continents 
